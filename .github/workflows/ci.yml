name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
      - name: Install OCM
        run: |
          ./scripts/install-ocm-ci.sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/ocm" --version
      - name: Install dependencies
        run: npm ci
      - name: Run check suite
        run: npm run check:full
      - name: Smoke package install
        run: |
          npm run pack:release
          tmp="$(mktemp -d)"
          ./install.sh --archive ./dist/kova.tar.gz --prefix "$tmp/kova" --bin-dir "$tmp/bin" --require-ocm
          (
            cd "$tmp"
            "$tmp/bin/kova" version
            "$tmp/bin/kova" setup --ci --json
            "$tmp/bin/kova" self-check
          )
          rm -rf "$tmp"
