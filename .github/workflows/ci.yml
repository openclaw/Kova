name: CI

env:
  OCM_INSTALL_REF: 9cc465d48cc0e263ae8204ed4e32b0bdb5e0b58b
  OCM_VERSION: v0.2.25

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install OCM
        run: |
          ./scripts/install-ocm-ci.sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/ocm" --version
      - name: Install dependencies
        run: npm ci
      - name: Run check suite
        run: npm run check
      - name: Smoke package install
        run: |
          npm run pack:release
          tmp="$(mktemp -d)"
          ./install.sh --archive ./dist/kova.tar.gz --prefix "$tmp/kova" --bin-dir "$tmp/bin" --require-ocm
          "$tmp/bin/kova" version
          "$tmp/bin/kova" setup --ci --json
          "$tmp/bin/kova" self-check
          rm -rf "$tmp"
