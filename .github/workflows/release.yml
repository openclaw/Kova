name: Release Build

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build release archive
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Verify release ref
        run: |
          set -euo pipefail
          package_version="$(node -p 'require("./package.json").version')"
          test "${GITHUB_REF_NAME}" = "v${package_version}"
          git -c gpg.format=ssh \
            -c gpg.ssh.allowedSignersFile=.github/release-allowed-signers \
            verify-tag "${GITHUB_REF_NAME}"
          git merge-base --is-ancestor "${GITHUB_SHA}" origin/main
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
      - name: Install OCM
        run: |
          ./scripts/install-ocm-ci.sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/ocm" --version
      - name: Install dependencies
        run: npm ci
      - name: Run checks
        run: npm run check:full
      - name: Package release archive
        run: ./scripts/package-release.sh --output-dir ./dist
      - name: Smoke install archive
        run: |
          tmp="$(mktemp -d)"
          ./install.sh --archive ./dist/kova.tar.gz --prefix "$tmp/kova" --bin-dir "$tmp/bin" --require-ocm
          (
            cd "$tmp"
            "$tmp/bin/kova" version
            "$tmp/bin/kova" setup --ci --json
            "$tmp/bin/kova" self-check
          )
          rm -rf "$tmp"
      - name: Stage release archive
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: kova-release
          path: |
            ./dist/*.tar.gz*
            ./dist/release-metadata.json
          if-no-files-found: error
