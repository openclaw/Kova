name: Release Build

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build release archive
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Verify release ref
        run: |
          set -euo pipefail
          package_version="$(node -p 'require("./package.json").version')"
          test "${GITHUB_REF_NAME}" = "v${package_version}"
          git fetch --force --no-tags origin \
            "refs/tags/${GITHUB_REF_NAME}:refs/tags/${GITHUB_REF_NAME}"
          test "$(git rev-parse "${GITHUB_REF_NAME}^{commit}")" = "${GITHUB_SHA}"
          git -c gpg.format=ssh \
            -c gpg.ssh.allowedSignersFile=.github/release-allowed-signers \
            verify-tag "${GITHUB_REF_NAME}"
          git merge-base --is-ancestor "${GITHUB_SHA}" origin/main
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
      - name: Install OCM
        run: |
          ./scripts/install-ocm-ci.sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/ocm" --version
      - name: Install dependencies
        run: npm ci
      - name: Run checks
        run: npm run check:full
      - name: Package release archive
        run: ./scripts/package-release.sh --output-dir ./dist
      - name: Smoke install archive
        run: |
          tmp="$(mktemp -d)"
          ./install.sh --archive ./dist/kova.tar.gz --prefix "$tmp/kova" --bin-dir "$tmp/bin" --require-ocm
          (
            cd "$tmp"
            "$tmp/bin/kova" version
            "$tmp/bin/kova" setup --ci --json
            "$tmp/bin/kova" self-check
          )
          rm -rf "$tmp"
      - name: Stage release archive
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kova-release
          path: |
            ./dist/*.tar.gz*
            ./dist/release-metadata.json
          if-no-files-found: error
